services:
  - type: web
    name: nids-ml-service
    runtime: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.9

  - type: web
    name: nids-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ML_SERVICE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: API_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
